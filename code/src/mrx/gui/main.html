<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">

  <title>MrX</title>

</head>

<body>
    <div id="main">
        <div style="position: relative; display: flex; align-items: center; padding: 50px;">
                
            <h1 id="acc-hdr" style="margin: 0 auto;">Current accuracy: 300m</h1>

            <button onclick="logout()" style="position: absolute; right: 50px;">
                Log out
            </button>

        </div>

        <div style="display: flex; justify-content: center; align-items: center; padding-top: 10px; padding-bottom: 20px">
            <button id="acc-btn" onclick="set_accuracy()" style="margin-right: 10px; margin-left: 10px">
                    Set Accuracy
            </button>
            <input type="text" id="acc-input" placeholder="Accuracy..." style="margin-right: 10px; margin-left: 10px">
        </div>
        <div style="display: flex; justify-content: center; align-items: center; padding: 20px;">
            <iframe id="map-frm" src="map.html" width="900px" height="600px" style="border: none;"></iframe>
        </div>
    </div>

  <script>
    function wait_for_py() {
        return new Promise((resolve) => {
            if (window.pywebview) {
                resolve();
                return;
            }

            window.addEventListener('pywebviewready', () => {
                resolve();
            });
        });
    }

    function init_map() {
        const iframe = document.getElementById("map-frm");
        iframe.contentWindow.init()
    }

    async function set_accuracy() {
        const acc = document.getElementById("acc-input").value;
        await window.pywebview.api.update_client_accuracy(acc);
    }

    function update_map(user, others) {
        const iframe = document.getElementById("map-frm");
        iframe.contentWindow.update_map(user, others)
    }

    function update_location(location) {
        let path = ""

        switch(location) {
            case 0:
                path = "login.html";
                break;
            case 1:
                path = "signup.html";
                break;
            case 2:
                path = "main.html";
                break;
        }

        window.location.href = path;
    }

    function update_accuracy(accuracy) {
        const hdr = document.getElementById("acc-hdr");
        hdr.innerText = "Current accuracy: " + accuracy + "m"
    }

    async function logout() {
        await window.pywebview.api.update_client_location(0);
    }

    window.onload = async function () {
        init_map();

        await wait_for_py();
        await window.pywebview.api.update_client_init_map();
    };
  </script>

</body>
</html>
