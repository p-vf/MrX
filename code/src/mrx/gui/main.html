<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">

  <title>MrX</title>

</head>

<body>
    <div id="main">
        <div style="position: relative; display: flex; align-items: center; justify-content: center; padding: 20px 20px 40px 20px;">

            <div style="position: absolute; left: 50px; display: flex; justify-content: center; align-items: center">
                <button class="img_btn" onclick="open_requests()" style="margin-right: 10px;">
                    <img src="img/mail-32.png" alt="friend requests">
                </button>
                <dialog id="requests" class="opt_window">

                </dialog>
                <button id="add-btn" onclick="add_friend()" style="margin-right: 10px; margin-left: 10px">
                    Add friend
                </button>
                <input id="add-input" type="text" placeholder="Username..." style="margin-right: 10px; margin-left: 10px">
            </div>
                
            <h1 id="acc-hdr">See Where Your Friends Are</h1>

            <button onclick="logout()" style="position: absolute; right: 50px;">
                Log out
            </button>

        </div>
        <div style="display: flex; justify-content: center; align-items: center; padding: 40px 20px 20px 20px;">
            <div id="friendlist" class="friendlist"></div>
            <iframe id="map-frm" src="map.html" width="1080px" height="720px" style="border: none;"></iframe>
        </div>
    </div>

  <script>
    function wait_for_py() {
        return new Promise((resolve) => {
            if (window.pywebview) {
                resolve();
                return;
            }

            window.addEventListener('pywebviewready', () => {
                resolve();
            });
        });
    }

    function init_map() {
        const iframe = document.getElementById("map-frm");
        iframe.contentWindow.init()
    }

    function update_map() {
        const iframe = document.getElementById("map-frm");
        iframe.contentWindow.update_map(pywebview.state.user_rect, pywebview.state.other_user_rects)
    }

    async function add_friend(){
        const input = document.getElementById("add-input");
        const friend = input.value;
        input.value = "";
        await window.pywebview.api.update_client_add_friend(friend);
    }

    function update_location() {
        let path = "";
        const location = pywebview.state.location;

        switch(location) {
            case 0:
                path = "login.html";
                break;
            case 1:
                path = "signup.html";
                break;
            case 2:
                path = "main.html";
                break;
        }

        window.location.href = path;
    }

    async function logout() {
        await window.pywebview.api.update_client_location(0);
    }

    function update_friendlist() {
        const friends = pywebview.state.friends;
        const friendlist = document.getElementById("friendlist");

        for (let i = 0; i < friends.length; i++) {
            const friend_container = document.createElement("div");
            const row_container = document.createElement("div");
            const min_max_container = document.createElement("div");
            const tag = document.createElement("div");
            const opt_btn = document.createElement("button");
            const options = document.createElement("dialog");   
            const acc_text = document.createElement("p");
            const acc_value = document.createElement("p");
            const slider = document.createElement("input");
            const opt_img = document.createElement("img");
            const remove_btn = document.createElement("button");
            const close_btn = document.createElement("button");

            friend_container.className = "friend_container";
            row_container.className = "row_container";
            min_max_container.className = "friend_container"
            tag.className = "friend";
            options.className = "opt_window"
            opt_btn.className = "img_btn";
            acc_text.className = "just_txt";
            acc_value.className = "just_txt";
            slider.className = "depth_slider";

            min_max_container.style = "display: flex; justify-content: space-between; align-items: center;"
            friend_container.style = "margin-bottom: 5px;";
            row_container.style = "margin-bottom: 5px;";

            friend_container.id = friends[i][0];

            tag.innerText = friends[i][0];
            acc_text.innerText = "accuracy";
            remove_btn.innerText = `remove ${friends[i][0]}?`
            close_btn.innerText = "close";

            opt_btn.onclick = () => options.showModal();
            close_btn.onclick = () => options.close();
            remove_btn.onclick = () => {
                remove_friend(friends[i][0])
                options.close();
            };

            opt_img.src="img/settings-4-32.png";
            opt_img.alt="options";

            slider.type = "range";
            slider.min = 0;
            slider.max = pywebview.state.acc_steps.length - 1;
            slider.value = friends[i][1];
            slider.step = 1;

            slider.addEventListener('input', e => {
                acc_value.innerText = Math.floor(pywebview.state.acc_steps[e.target.value]);
            });

            slider.addEventListener('pointerup', e => {
                change_other_accuracy(friends[i][0], e.target.value);
            });

            acc_value.innerText = Math.floor(pywebview.state.acc_steps[slider.value]);

            opt_btn.appendChild(opt_img);
            options.appendChild(remove_btn);
            options.appendChild(close_btn);
            row_container.appendChild(tag);
            row_container.appendChild(opt_btn);
            row_container.appendChild(options);
            min_max_container.appendChild(acc_text);
            min_max_container.appendChild(acc_value);
            friend_container.appendChild(row_container);
            friend_container.appendChild(min_max_container);
            friend_container.appendChild(slider);
            friendlist.appendChild(friend_container);
        }
    }

    async function change_other_accuracy(friend, value) {
        await window.pywebview.api.update_client_others_accuracy(friend, value);
    }

    async function remove_friend(friend) {
        await window.pywebview.api.update_client_remove_friend(friend);
    }

    async function answer_request(friend, answer) {
        const requests = pywebview.state.requests;
        await window.pywebview.api.update_client_accept_request(friend, answer);
        pywebview.state.requests = requests.filter(req => req != friend);
    }

    function update_remove_friend() {
        const friend = pywebview.state.remove;
        const friend_div = document.getElementById(friend);
        friend_div.remove();
    }

    function open_requests() {
        const requests = document.getElementById("requests");
        const req_list = pywebview.state.requests;
        requests.innerHTML = "";

        if (req_list.length == 0) {
            alert("no new requests!");
        } else {
            const col = document.createElement("div");
            col.classname = "friend_container";

            for(let i = 0; i < req_list.length; i++) {
                const cont = document.createElement("div")
                const req = document.createElement("div");
                const acc = document.createElement("button");
                const dny = document.createElement("button");
                const acc_img = document.createElement("img");
                const dny_img = document.createElement("img");

                cont.className = "row_container"
                req.className = "friend";
                acc.className = "img_btn";
                dny.className = "img_btn";

                cont.style = "margin: 10px;"
                req.style = "padding: 5px;"
                acc.style = "padding: 5px;"
                dny.style = "padding: 5px;"

                acc_img.src = "img/check-mark-32.png";
                acc_img.alt = "accept request";
                dny_img.src = "img/x-mark-32.png";
                dny_img.alt = "deny request";
                req.innerText = req_list[i];

                acc.onclick = () => {
                    answer_request(req_list[i], 0);
                    requests.close();
                };
                dny.onclick = () => {
                    answer_request(req_list[i], 1);
                    requests.close();
                };

                acc.appendChild(acc_img);
                dny.appendChild(dny_img);
                cont.appendChild(req);
                cont.appendChild(acc);
                cont.appendChild(dny);
                col.appendChild(cont);
            }

            const close_btn = document.createElement("button");
            close_btn.style = "margin: 0px 0px 15px 15px;"
            close_btn.innerText = "close";
            close_btn.onclick = () => {
                requests.close();
            };

            requests.appendChild(col);
            requests.appendChild(close_btn);
            requests.showModal();
        }
    }

    window.onload = async function () {
        init_map();

        await wait_for_py();
        await window.pywebview.api.update_client_ready();
    };
  </script>

</body>
</html>
